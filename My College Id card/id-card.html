<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My College ID Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card-container">

        <div class="id-card">

            <header class="card-header">
                <img src="images//ib-panipat.webp" alt="College Logo" class="logo">
                <p>IB (PG) College, Panipat </p>
            </header>

            <div class="photo-wrap">
                <img src="images/cat-taking-a-selfie.webp" alt="Profile Photo" class="photo">
            </div>

            <main class="card-body">

                <div class="name-section">
                    <h2 class="student-name">Tarun Jangra</h2>
                    <p class="college">IB College</p>
                </div>

                <hr class="divider">

                <div class="details">
                    <p><strong>Course:</strong> BCA</p>
                    <p><strong>Birthdate:</strong> 19 March 2003</p>
                </div>

                <div class="id-line">
                    <span class="id-label">ID No.:</span>
                    <span class="id-value">GC2025001</span>
                </div>

                <div class="barcode"></div>

            </main>

            <footer class="card-footer">
                <p class="footer-text">
                    Issued By: IB (PG) College Administration
                </p>
            </footer>

        </div>

    </div>

</body>

</html>
